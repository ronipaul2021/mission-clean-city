{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] bg-background flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <h2 class="text-3xl font-extrabold text-primary-dark">Recover Password</h2>
        <p class="mt-2 text-sm text-gray-600">Enter your details to receive a reset OTP</p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-xl border border-gray-100 sm:rounded-2xl sm:px-10">
            <form class="space-y-6" action="{% url 'forgot_password' %}" method="POST">
                {% csrf_token %}
                
                <div>
                    <label for="mobile_number" class="block text-sm font-medium text-gray-700">Mobile Number</label>
                    <input id="mobile_number" name="mobile_number" type="tel" required 
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Registered Email</label>
                    <input id="email" name="email" type="email" required 
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm">
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-primary hover:bg-primary-dark transition-all transform hover:-translate-y-0.5">
                        Send Reset OTP
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center">
                <a href="{% url 'citizen_login' %}" class="text-sm font-medium text-primary hover:text-secondary transition-colors">
                    Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
