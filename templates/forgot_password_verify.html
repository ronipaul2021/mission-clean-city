{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] bg-background flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <h2 class="text-3xl font-extrabold text-primary-dark">Verify OTP</h2>
        <p class="mt-2 text-sm text-gray-600">Please enter the 6-digit code sent to your email.</p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-xl border border-gray-100 sm:rounded-2xl sm:px-10">
            <form class="space-y-6" action="{% url 'forgot_password_verify_otp' %}" method="POST">
                {% csrf_token %}
                
                <div>
                    <label for="otp" class="block text-sm font-medium text-gray-700">Enter OTP</label>
                    <input id="otp" name="otp" type="text" maxlength="6" required 
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm text-center text-2xl tracking-[1em] focus:ring-primary focus:border-primary sm:text-sm">
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-primary hover:bg-primary-dark transition-all transform hover:-translate-y-0.5">
                        Verify OTP
                    </button>
                </div>
            </form>
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-500">Didn't receive the OTP?</p>
                <form id="resend-form" action="{% url 'forgot_password_verify_otp' %}" method="POST" class="mt-2 inline">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="resend">
                    <button type="submit" id="resend-btn" class="text-sm font-semibold text-primary hover:text-primary-dark disabled:opacity-50 disabled:cursor-not-allowed">
                        Resend OTP
                    </button>
                </form>
                <p id="countdown-text" class="mt-2 text-xs text-gray-400 hidden">
                    Resend available in <span id="seconds">60</span>s
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const resendBtn = document.getElementById('resend-btn');
        const countdownText = document.getElementById('countdown-text');
        const secondsSpan = document.getElementById('seconds');
        let timeLeft = 60;

        function startCountdown() {
            resendBtn.disabled = true;
            countdownText.classList.remove('hidden');
            
            const timer = setInterval(() => {
                timeLeft--;
                secondsSpan.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    resendBtn.disabled = false;
                    countdownText.classList.add('hidden');
                    timeLeft = 60;
                }
            }, 1000);
        }

        startCountdown();
    });
</script>
{% endblock %}
