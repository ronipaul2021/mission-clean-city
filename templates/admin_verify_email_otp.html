{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] bg-background flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <h2 class="text-3xl font-extrabold text-primary-dark">Verify Admin Email</h2>
        <p class="mt-2 text-sm text-gray-600">A verification code has been sent to your new email: <strong>{{ new_email }}</strong></p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-xl border border-gray-100 sm:rounded-2xl sm:px-10 border-t-4 border-secondary">
            <form class="space-y-6" action="{% url 'admin_verify_email_update' %}" method="POST">
                {% csrf_token %}
                
                <div>
                    <label for="otp" class="block text-sm font-medium text-gray-700 text-center mb-2">Enter 6-Digit OTP</label>
                    <input id="otp" name="otp" type="text" maxlength="6" required 
                        placeholder="— — — — — —"
                        class="block w-full px-3 py-3 border border-gray-300 rounded-xl shadow-sm text-center text-3xl tracking-[0.5em] font-bold focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition">
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-secondary hover:bg-primary-dark transition-all transform hover:-translate-y-0.5">
                        Confirm &amp; Update Email
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center border-t border-gray-100 pt-6">
                <p class="text-sm text-gray-500">Didn't receive the OTP?</p>
                <form id="resend-form" action="{% url 'admin_verify_email_update' %}" method="POST" class="mt-2 inline">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="resend">
                    <button type="submit" id="resend-btn" class="text-sm font-semibold text-secondary hover:text-primary-dark disabled:opacity-50 disabled:cursor-not-allowed">
                        Resend OTP
                    </button>
                </form>
                <p id="countdown-text" class="mt-2 text-xs text-gray-400 hidden">
                    Resend available in <span id="seconds">60</span>s
                </p>
            </div>
            
            <div class="mt-6 text-center">
                <a href="{% url 'admin_profile_edit' %}" class="text-sm font-medium text-gray-500 hover:text-secondary transition-colors">
                    ← Back to Edit Profile
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const resendBtn = document.getElementById('resend-btn');
        const countdownText = document.getElementById('countdown-text');
        const secondsSpan = document.getElementById('seconds');
        let timeLeft = 60;

        function startCountdown() {
            resendBtn.disabled = true;
            countdownText.classList.remove('hidden');
            
            const timer = setInterval(() => {
                timeLeft--;
                secondsSpan.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    resendBtn.disabled = false;
                    countdownText.classList.add('hidden');
                    timeLeft = 60;
                }
            }, 1000);
        }

        startCountdown();
    });
</script>
{% endblock %}
