{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-background flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="text-center">
            <h2 class="mt-4 text-center text-3xl font-extrabold text-primary-dark">
                Verify OTP
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                A 6-digit reset code has been sent to your admin email address.
            </p>
        </div>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-xl border border-gray-100 sm:rounded-2xl sm:px-10 border-t-4 border-secondary">

            <form class="space-y-6" action="{% url 'admin_forgot_password_verify_otp' %}" method="POST">
                {% csrf_token %}
                <div>
                    <label for="otp" class="block text-sm font-medium text-gray-700 text-center">Enter 6-Digit OTP</label>
                    <div class="mt-2">
                        <input
                            id="otp"
                            name="otp"
                            type="text"
                            inputmode="numeric"
                            maxlength="6"
                            pattern="\d{6}"
                            required
                            placeholder="— — — — — —"
                            class="appearance-none block w-full px-3 py-3 border border-gray-300 rounded-md shadow-sm placeholder-gray-300 focus:outline-none focus:ring-secondary focus:border-secondary text-2xl text-center tracking-[0.5em] font-bold"
                        >
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-secondary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary transition-all transform hover:-translate-y-0.5">
                        Verify OTP & Proceed
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <a href="{% url 'admin_forgot_password' %}" class="text-sm font-semibold text-gray-500 hover:text-gray-700">
                    ← Back
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
