{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] bg-background flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-3xl font-extrabold text-primary-dark">
            Admin Portal Login
        </h2>
        <p class="mt-2 text-center text-sm text-gray-600">
            Authorized Personnel Only
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border-t-4 border-secondary">
            <form class="space-y-6" action="{% url 'admin_login' %}" method="POST">
                {% csrf_token %}
                
                <div>
                    <label for="employee_id" class="block text-sm font-medium text-gray-700">Employee ID</label>
                    <div class="mt-1">
                        <input id="employee_id" name="employee_id" type="text" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-secondary focus:border-secondary sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-secondary focus:border-secondary sm:text-sm">
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-secondary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary transition-all transform hover:-translate-y-0.5">
                        Sign In to Dashboard
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <a href="{% url 'admin_forgot_password' %}" class="text-sm font-medium text-secondary hover:text-primary-dark transition-colors">
                    Forgot your admin password?
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
