{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Remove the bluish shadow from the main navbar on this page */
    #main-navbar,
    #main-navbar.scrolled {
        box-shadow: none !important;
    }
</style>
<div
    class="min-h-[85vh] bg-slate-50/50 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <!-- Clean, Focused Header -->
    <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10 text-center mb-8">
        <h2 class="text-3xl font-black text-slate-800 tracking-tight leading-none">
            Citizen Login
        </h2>
        <p class="text-sm text-slate-500 font-medium mt-3">
            or <a href="{% url 'citizen_register' %}"
                class="font-bold text-[#C75000] hover:text-orange-700 hover:underline transition-all">Create a New
                Account</a>
        </p>
    </div>

    <div class="mt-8 mx-4 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
        <div class="bg-white py-8 px-4 shadow rounded-lg sm:px-10 border-t-4 border-primary">
            <form class="space-y-6" action="{% url 'citizen_login' %}" method="POST" autocomplete="off">
                {% csrf_token %}

                <!-- Mobile Number Field -->
                <div>
                    <label for="mobile_number" class="block text-sm font-medium text-gray-700">Mobile Number</label>
                    <div class="mt-1">
                        <input id="mobile_number" name="mobile_number" type="tel" readonly autocomplete="off" required
                            placeholder="Enter 10-digit mobile number"
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-secondary focus:border-secondary sm:text-sm"
                            onfocus="this.removeAttribute('readonly');" onmousedown="this.removeAttribute('readonly');"
                            onpointerdown="this.removeAttribute('readonly');">
                    </div>
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <div class="mt-1 relative">
                        <input id="password" name="password" type="password" readonly autocomplete="off" required
                            placeholder="Enter your password"
                            class="appearance-none block w-full pl-3 pr-10 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-secondary focus:border-secondary sm:text-sm"
                            onfocus="this.removeAttribute('readonly');" onmousedown="this.removeAttribute('readonly');"
                            onpointerdown="this.removeAttribute('readonly');">
                        <button type="button" onclick="togglePasswordVisibility('password', this)"
                            class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 focus:outline-none">
                            <svg class="h-5 w-5 eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg class="h-5 w-5 eye-off-icon hidden" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.025 10.025 0 013.208-4.47M12 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-2.25 3.5m-3.125-3.125a3 3 0 11-4.243-4.243" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Sign In Button with dynamic hover transitions and custom gradient -->
                <div class="pt-2">
                    <button type="submit"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-2xl text-sm font-black text-white bg-gradient-to-r from-[#002D72] via-[#004B87] to-[#002D72] hover:from-[#001a45] hover:to-[#003866] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#002D72] transition-all duration-300 transform hover:-translate-y-0.5 active:translate-y-0">
                        Sign In to Dashboard
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <a href="{% url 'forgot_password' %}"
                    class="text-sm font-medium text-secondary hover:text-primary-dark transition-colors">
                    Forgot your password?
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePasswordVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        const eyeIcon = btn.querySelector('.eye-icon');
        const eyeOffIcon = btn.querySelector('.eye-off-icon');

        if (input.type === 'password') {
            input.type = 'text';
            eyeIcon.classList.add('hidden');
            eyeOffIcon.classList.remove('hidden');
        } else {
            input.type = 'password';
            eyeIcon.classList.remove('hidden');
            eyeOffIcon.classList.add('hidden');
        }
    }

    // Safety fallback: Ensure any programmatic autocompletion behavior respects the read-only attribute
    document.addEventListener("DOMContentLoaded", function () {
        const fields = [document.getElementById('mobile_number'), document.getElementById('password')];
        fields.forEach(field => {
            if (field) {
                // Keep it readOnly on load
                field.readOnly = true;

                // Clear any potential background autofill colors
                field.value = '';
            }
        });
    });
</script>
{% endblock %}
